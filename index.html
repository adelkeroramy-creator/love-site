<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💙 katkota - katkoty Series (Ultimate)</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;

/* 💖 خلفية بينك رومانسية */
background: linear-gradient(135deg, #ff4da6, #ffb6e6, #ff66c4);
background-size: 400% 400%;
animation: bgMove 10s ease infinite;
}

/* حركة الخلفية */
@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* ===== CINEMATIC INTRO ===== */
#intro{
position:fixed;
width:100%;height:100%;
background:transparent;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
animation:fadeOut 1s ease 5s forwards;
}
#intro h1{
font-size:70px;
color:#ffffff;
animation:zoom 2s ease;
letter-spacing:3px;
}
#intro p{opacity:0.9}

@keyframes zoom{
from{transform:scale(0.5);opacity:0}
to{transform:scale(1);opacity:1}
}
@keyframes fadeOut{
to{opacity:0;visibility:hidden}
}

/* ===== BACKGROUND SLIDES ===== */
.bg{
position:fixed;
top:0;left:0;
width:100%;height:100%;
z-index:-3;
}
.bg img{
position:absolute;
width:100%;height:100%;
object-fit:cover;
opacity:0;
animation:bgfade 24s infinite;
filter:blur(2px);
}
.bg img:nth-child(1){animation-delay:0s;}
.bg img:nth-child(2){animation-delay:6s;}
.bg img:nth-child(3){animation-delay:12s;}
.bg img:nth-child(4){animation-delay:18s;}

@keyframes bgfade{
0%{opacity:0}
10%{opacity:1}
25%{opacity:1}
35%{opacity:0}
100%{opacity:0}
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.25);
z-index:-2;
}

/* ===== PARTICLES ===== */
.star,.heart{
position:fixed;
z-index:-1;
}
.star{
width:2px;height:2px;background:white;
opacity:0.6;
animation:fall linear infinite;
}
@keyframes fall{
from{transform:translateY(-10vh)}
to{transform:translateY(110vh)}
}

.heart{
color:#ff1a8c;
animation:float 6s linear infinite;
}
@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* ===== EPISODES ===== */
.episode{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
text-align:center;
animation:fade 1s ease;
}
.episode.active{display:flex;}

@keyframes fade{
from{opacity:0;transform:scale(0.9)}
to{opacity:1;transform:scale(1)}
}

h1{color:#ffffff;font-size:42px;}

p{
max-width:850px;
font-size:20px;
line-height:1.9;
white-space:pre-line;
word-break:break-word;
text-align:center;
}

button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#ff2f92;
color:white;
font-size:18px;
cursor:pointer;
transition:0.3s;
}
button:hover{transform:scale(1.1);}

/* ===== GALLERY ===== */
.gallery{
display:flex;
flex-wrap:wrap;
gap:10px;
justify-content:center;
}
.gallery img{
width:140px;
height:140px;
object-fit:cover;
border-radius:12px;
border:2px solid white;
cursor:pointer;
transition:0.3s;
}
.gallery img:hover{transform:scale(1.2);}

.caption{
font-size:14px;
opacity:0.9;
margin-top:5px;
max-width:200px;
}

/* ===== MENU ===== */
.menu{
position:fixed;
top:10px;
right:10px;
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
}
.menu button{
display:block;
margin:5px 0;
font-size:13px;
}

/* ===== MUSIC ===== */
.music{
position:fixed;
bottom:10px;
left:10px;
background:#111;
padding:10px;
border-radius:10px;
}

/* ===== SURPRISE PAGE ===== */
#surprise{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(255,105,180,0.95);
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:1000;
text-align:center;
padding:20px;
animation:fade 1s ease;
}

#surprise h1{
color:white;
font-size:50px;
}

#surprise p{
max-width:800px;
font-size:22px;
line-height:1.9;
}

/* ===== MOBILE ===== */
@media (max-width:768px){
h1{font-size:30px;}
p{font-size:16px;}
.gallery img{width:100px;height:100px;}
.menu{transform:scale(0.9);}
button{font-size:14px;}
}

</style>
</head>

<body>

<!-- باقي الكود زي ما هو بدون تغيير -->
